<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Typeahead</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <h1>🔎 Search Typeahead</h1>
    <p class="sub">Start typing, suggestions are ranked by search popularity.</p>

    <div class="search-box">
      <!-- aria-* + role=combobox makes the dropdown accessible & keyboard-friendly -->
      <input
        id="search"
        type="text"
        placeholder="Try: iphone, java, pizza…"
        autocomplete="off"
        role="combobox"
        aria-expanded="false"
        aria-controls="suggestions"
        aria-autocomplete="list" />
      <button id="go">Search</button>

      <!-- Suggestion dropdown -->
      <ul id="suggestions" class="suggestions" role="listbox" hidden></ul>
    </div>

    <!-- Status line: loading / error / "Searched" responses -->
    <div id="status" class="status" aria-live="polite"></div>

    <section class="trending">
      <div class="trending-head">
        <h2>🔥 Trending</h2>
        <div class="toggle">
          <button data-mode="enhanced" class="active">Recent</button>
          <button data-mode="basic">All-time</button>
        </div>
      </div>
      <ol id="trending-list" class="trending-list"></ol>
    </section>

    <footer class="foot">
      <a href="/metrics" target="_blank">/metrics</a> ·
      <span id="meta"></span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
